name: interview
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: "none"
version: 1.1.0+7

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  animate_do: ^4.2.0
  flutter_svg: ^2.0.10+1
  flutter_spinkit: ^5.0.0
  pin_code_fields: ^8.0.1
  flutter_screenutil: ^5.9.3
  email_validator: ^3.0.0
  rich_text_widget:
  simple_grouped_listview:
  intl:
  device_preview: ^1.2.0

  dio: ^5.7.0
  flutter_riverpod: ^2.6.1
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3
  webview_flutter: ^4.10.0
  qr_flutter: ^4.1.0
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  permission_handler: ^11.3.1
  url_launcher: ^6.2.6

  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  firebase_messaging: ^15.0.0
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.0
  crypto: ^3.0.3
  fluttertoast: ^8.2.4
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons:
flutter_launcher_icons:
  ios: true
  android: true
  image_path: "assets/icon/icon.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/images/
    # - images/a_dot_ham.jpeg

  fonts:
    - family: NotoSansJP
      fonts:
        - asset: assets/fonts/Noto Sans JP Thin 250.otf
        - asset: assets/fonts/Noto Sans JP Light 300.otf
          weight: 300
        - asset: assets/fonts/Noto Sans JP 400.otf
        - asset: assets/fonts/Noto Sans JP Medium 500.otf
          weight: 500
        - asset: assets/fonts/Noto Sans JP Bold 700.otf
          weight: 700
        - asset: assets/fonts/Noto Sans JP Black 900.otf
          weight: 900
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
